<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoHarmony Park — Horario</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <span class="logo-icon">🌿</span>
    <h1>EcoHarmony Park</h1>
    <p>Sistema de inscripción a actividades</p>
  </header>

  <div class="contenedor">

    <div class="progreso-wrapper">
      <div class="pasos-labels">
        <span class="paso-label completado">Actividad</span>
        <span class="paso-label activo">Horario</span>
        <span class="paso-label">Visitantes</span>
        <span class="paso-label">Confirmar</span>
      </div>
      <div class="barra-progreso">
        <div class="barra-fill" style="width: 50%"></div>
      </div>
    </div>

    <div class="tarjeta">
      <h2 class="paso-titulo">Elegí un horario</h2>
      <p class="paso-subtitulo" id="subtitulo-horario">Horarios disponibles para la actividad seleccionada.</p>
      <div class="grid-horarios" id="grid-horarios">
        <p style="color:#aaa;font-size:0.85rem">Cargando horarios...</p>
      </div>
      <div class="alerta" id="error-2">⚠️ <span></span></div>
      <div class="nav-botones">
        <button class="btn btn-secundario" id="btn-atras">← Volver</button>
        <button class="btn btn-primario" id="btn-siguiente">Continuar →</button>
      </div>
    </div>

  </div>

  <script>
    function getState() {
      try { return JSON.parse(localStorage.getItem('ecoState') || '{}'); } catch { return {}; }
    }
    function setState(updates) {
      const s = getState();
      localStorage.setItem('ecoState', JSON.stringify({ ...s, ...updates }));
    }

    const state = getState();
    if (!state.actividadSeleccionada) {
      window.location.href = 'index.html';
    }

    let horarioSeleccionado = state.horarioSeleccionado || null;

    document.getElementById('subtitulo-horario').textContent =
      `Horarios disponibles para ${state.actividadSeleccionada}.`;

    function mostrarError(msg) {
      const el = document.getElementById('error-2');
      el.querySelector('span').textContent = msg;
      el.classList.add('visible');
      setTimeout(() => el.classList.remove('visible'), 5000);
    }

    async function cargarHorarios() {
      const grid = document.getElementById('grid-horarios');
      try {
        const res = await fetch(`/api/actividades/${state.actividadSeleccionada}/horarios`);
        const data = await res.json();
        grid.innerHTML = '';
        if (data.horarios.length === 0) {
          grid.innerHTML = '<p style="color:#aaa;font-size:0.85rem;grid-column:1/-1">No hay horarios disponibles en este momento.</p>';
          return;
        }
        data.horarios.forEach(h => {
          const card = document.createElement('div');
          card.className = 'card-horario' + (horarioSeleccionado?.id === h.id ? ' seleccionado' : '');
          card.dataset.id = h.id;
          card.innerHTML = `
            <span class="hora">${h.hora}</span>
            <span class="cupos">${h.cuposDisponibles} cupos</span>
          `;
          card.addEventListener('click', () => {
            document.querySelectorAll('.card-horario').forEach(c => c.classList.remove('seleccionado'));
            card.classList.add('seleccionado');
            horarioSeleccionado = h;
          });
          grid.appendChild(card);
        });
      } catch {
        grid.innerHTML = '<p style="color:red">Error al cargar horarios.</p>';
      }
    }

    document.getElementById('btn-atras').addEventListener('click', () => {
      window.location.href = 'index.html';
    });

    document.getElementById('btn-siguiente').addEventListener('click', () => {
      if (!horarioSeleccionado) {
        mostrarError('Por favor seleccioná un horario.');
        return;
      }
      setState({ horarioSeleccionado, cantidadVisitantes: 1, visitantes: [], email: '' });
      window.location.href = 'paso3.html';
    });

    cargarHorarios();
  </script>

</body>
</html>
