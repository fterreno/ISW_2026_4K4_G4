<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoHarmony Park — ¡Inscripción exitosa!</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <span class="logo-icon">🌿</span>
    <h1>EcoHarmony Park</h1>
    <p>Sistema de inscripción a actividades</p>
  </header>

  <div class="contenedor">
    <div class="tarjeta">
      <div class="exito-wrapper">
        <h2 class="exito-titulo">¡Inscripción exitosa!</h2>
        <p class="exito-subtitulo">Te enviamos un email de confirmación con todos los detalles de tu reserva.</p>
        <div class="exito-detalle" id="exito-detalle"></div>
        <p class="exito-id" id="exito-id"></p>
        <button class="btn-nueva" id="btn-nueva">Hacer otra inscripción</button>
      </div>
    </div>
  </div>

  <script>
    function getState() {
      try { return JSON.parse(localStorage.getItem('ecoState') || '{}'); } catch { return {}; }
    }
    function clearState() { localStorage.removeItem('ecoState'); }

    const state = getState();
    if (!state.inscripcion) {
      window.location.href = 'index.html';
    } else {
      const ins = state.inscripcion;
      document.getElementById('exito-detalle').innerHTML = `
        <div class="exito-fila"><span>Actividad</span><span>${ins.actividad}</span></div>
        <div class="exito-fila"><span>Horario</span><span>${ins.horario.hora}</span></div>
        <div class="exito-fila"><span>Visitantes</span><span>${ins.visitantes.length} persona${ins.visitantes.length > 1 ? 's' : ''}</span></div>
        <div class="exito-fila"><span>Email</span><span>${state.email}</span></div>
      `;
      document.getElementById('exito-id').textContent = `ID de inscripción: ${ins.id}`;
    }

    document.getElementById('btn-nueva').addEventListener('click', () => {
      clearState();
      window.location.href = 'index.html';
    });
  </script>

</body>
</html>
