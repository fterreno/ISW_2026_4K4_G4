<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoHarmony Park — ¡Inscripción exitosa!</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <eco-header subtitulo="Inscripción a actividades"></eco-header>

  <div class="contenedor">
    <div class="tarjeta">
      <div class="exito-wrapper">
        <h2 class="exito-titulo">¡Inscripción exitosa!</h2>
        <p class="exito-subtitulo">Te enviamos un email de confirmación con todos los detalles de tu reserva.</p>
        <div class="exito-detalle" id="exito-detalle"></div>
        <p class="exito-id" id="exito-id"></p>
        <button class="btn-nueva" id="btn-nueva">Hacer otra inscripción</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="exito.js"></script>
</body>
</html>
